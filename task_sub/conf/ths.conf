#******************************
# 脚本功能：同花顺☆每日签到
# 仓库地址：https://github.com/s1sunny/quanx_scripts
# 脚本作者：s1sunny
# 更新时间：2026-07-02
# 使用声明：此脚本仅供学习与交流，请勿转载与贩卖！
#
# ⚠️ 同花顺的 Cookie（v=...）为客户端动态生成
# 每次请求值不同。Rewrite 在用户打开APP签到页面时
# 自动捕获 Cookie 并执行签到。
# 定时任务使用缓存的 Cookie，如失败需打开APP刷新。
#*******************************

[task_local]
30 9 * * * https://raw.githubusercontent.com/s1sunny/quanx_scripts/refs/heads/main/app/ths/ths.js, tag=同花顺签到, img-url=https://raw.githubusercontent.com/s1sunny/quanx_scripts/refs/heads/main/task_sub/icon/ths.png, enabled=true

[rewrite_local]
# 同花顺Cookie捕获 - 打开签到页面时自动捕获并签到
^https:\/\/yyzt\.10jqka\.com\.cn\/gbct\/external\/checkin\/v1\/(summary|today_sign) url script-request-header https://raw.githubusercontent.com/s1sunny/quanx_scripts/refs/heads/main/app/ths/ths.js

[mitm]
hostname = yyzt.10jqka.com.cn